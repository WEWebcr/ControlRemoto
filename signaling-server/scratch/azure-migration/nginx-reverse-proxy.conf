# ==========================================
# CONFIGURACIÓN DE PROXY INVERSO EN NGINX (AZURE WINDOWS)
# ==========================================
# Copia este bloque dentro de la sección "http" de tu archivo C:\nginx\conf\nginx.conf
# o inclúyelo mediante "include" apuntando a este archivo.

server {
    listen 80;
    server_name kpisrosti.com; # Cambia esto por tu dominio o subdominio en Azure

    # Redirección automática de HTTP a HTTPS
    return 301 https://$host:86$request_uri;
}

server {
    listen 86 ssl;
    server_name kpisrosti.com; # Cambia esto por tu dominio o subdominio en Azure

    # Certificados SSL de tu entidad certificadora en Azure
    # Reemplaza estas rutas con la ubicación de tus certificados SSL en Windows
    ssl_certificate "C:/nginx/ssl/kpisrosti.com.crt";
    ssl_certificate_key "C:/nginx/ssl/kpisrosti.com.key";

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Tamaño máximo de subida (para las actualizaciones de APKs en la consola)
    client_max_body_size 100M;

    # Enrutamiento de peticiones al Servidor de Señalización Node.js (Puerto 5086)
    location / {
        proxy_pass http://127.0.0.1:5086;
        
        # Cabeceras requeridas para soporte HTTP 1.1 y WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Cabeceras para conservar la IP y protocolos del cliente original
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Desactivar buffers para respuestas en streaming / WebSockets
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
