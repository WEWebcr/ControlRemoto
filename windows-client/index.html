<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remoto Control J&M - Cliente Windows</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts: Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="window-container">
    <!-- Custom Window Titlebar -->
    <div class="titlebar">
      <div class="titlebar-logo">
        <svg class="flame-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Agente J&M</span>
      </div>
      <div class="titlebar-controls">
        <button id="btn-settings" title="Configuración Avanzada">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <button id="btn-minimize" title="Minimizar">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button id="btn-close" title="Ocultar a bandeja">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
    </div>

    <!-- Main Content App -->
    <div class="app-content">
      <div class="header">
        <div class="logo-wrapper">
          <svg class="flame-icon-large" viewBox="0 0 24 24" fill="none" stroke="url(#flame-grad)" stroke-width="2">
            <defs>
              <linearGradient id="flame-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff4b2b" />
                <stop offset="100%" stop-color="#ff416c" />
              </linearGradient>
            </defs>
            <path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>REMOTO CONTROL J&M</h1>
        <p class="subtitle">Agente Windows Desatendido</p>
      </div>

      <!-- Connection Status Card -->
      <div class="glass-card status-card">
        <div class="status-indicator">
          <span class="status-dot disconnected" id="status-dot"></span>
          <span id="status-text">Desconectado</span>
        </div>
        <div class="radar-container" id="radar">
          <div class="radar-circle"></div>
          <div class="radar-circle"></div>
          <div class="radar-circle"></div>
        </div>
      </div>

      <!-- Status Details Card (Visible only when configured) -->
      <div class="glass-card status-details-card" id="status-details-card" style="display: none;">
        <div class="detail-row">
          <span class="detail-label">ID de Dispositivo (Vincular)</span>
          <div class="copy-input-wrapper" style="margin-top: 4.5px;">
            <input type="text" id="device-id-display" readonly style="flex: 1;">
            <button id="btn-copy-display" class="btn-icon" title="Copiar ID">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">Nombre del Equipo</span>
            <span class="info-val" id="lbl-device-name">-</span>
          </div>
          <div class="info-item">
            <span class="info-label">Grupo</span>
            <span class="info-val" id="lbl-device-group">-</span>
          </div>
        </div>
      </div>

      <!-- Config Form -->
      <div class="glass-card form-card" id="form-card">
        <div class="input-field">
          <label>ID de Dispositivo (Vincular)</label>
          <div class="copy-input-wrapper">
            <input type="text" id="device-id" readonly>
            <button id="btn-copy" class="btn-icon" title="Copiar ID">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
          </div>
        </div>

        <div class="input-field" id="server-url-field" style="display: none;">
          <label for="server-url">Servidor de Señalización</label>
          <input type="text" id="server-url" placeholder="https://remoto-control-jm.onrender.com">
        </div>

        <div class="input-row">
          <div class="input-field">
            <label for="device-name">Nombre del Equipo</label>
            <input type="text" id="device-name" placeholder="PC Oficina">
          </div>
          <div class="input-field">
            <label for="device-group">Grupo</label>
            <select id="device-group">
              <option value="Sin Grupo">Sin Grupo</option>
            </select>
          </div>
        </div>

        <div class="checkbox-field">
          <input type="checkbox" id="run-startup">
          <label for="run-startup">Iniciar automáticamente con Windows</label>
        </div>

        <button id="btn-save" class="btn-primary-gradient">Guardar y Conectar</button>
      </div>

      <div class="footer-info">
        <span>Doble clic en bandeja para reabrir</span>
        <span id="app-version" style="opacity: 0.5; font-size: 11px; margin-left: 8px;"></span>
      </div>
    </div>
  </div>

  <!-- Password Lock Modal Overlay -->
  <div class="password-modal-overlay" id="password-modal" style="display: none;">
    <div class="glass-card password-modal-content">
      <div class="modal-header">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="#ff4b2b" stroke-width="2" fill="none" style="margin: 0 auto 12px auto; display: block;">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <h3>Configuración Protegida</h3>
        <p>Ingrese contraseña para desbloquear</p>
      </div>
      <div class="input-field">
        <input type="password" id="settings-pass-input" placeholder="••••••••">
        <span id="password-error" class="error-text" style="display: none;">Contraseña incorrecta</span>
      </div>
      <div class="modal-buttons">
        <button id="btn-modal-cancel" class="btn-secondary-link">Cancelar</button>
        <button id="btn-modal-unlock" class="btn-primary-gradient">Desbloquear</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
